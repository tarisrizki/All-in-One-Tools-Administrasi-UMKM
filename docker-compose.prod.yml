# ============================================
# All-in-One Tools Administrasi UMKM
# Docker Compose — Production Environment
# ============================================
#
# PENTING sebelum deploy pertama kali: buat file .env di folder ini (sebelah
# docker-compose.prod.yml) berisi minimal JWT_SECRET, POSTGRES_PASSWORD, dan
# CORS_ORIGIN -- lihat .env.example. Compose ini SENGAJA tidak punya nilai
# default untuk secret (${VAR:?...}) supaya deploy GAGAL JELAS kalau lupa
# diisi, daripada diam-diam jalan pakai secret bawaan yang sudah ke-commit
# di repo publik ini (siapa saja yang baca repo ini tahu nilainya).

services:
  # --- Frontend (SvelteKit) ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: umkm-frontend-prod
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=8080
      - PUBLIC_API_URL=${PUBLIC_API_URL:-http://localhost:3001}
    ports:
      - "8080:8080"
    depends_on:
      - backend

  # --- Backend (Fastify) ---
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: umkm-backend-prod
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${POSTGRES_DB:-umkm_db}
      - DB_USER=${POSTGRES_USER:-umkm_user}
      - DB_PASSWORD=${POSTGRES_PASSWORD:?Wajib diisi di .env -- jangan pakai default}
      - JWT_SECRET=${JWT_SECRET:?Wajib diisi di .env -- generate dengan: openssl rand -base64 48}
      - CORS_ORIGIN=${CORS_ORIGIN:?Wajib diisi di .env, contoh: https://app.tokokamu.com}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/v1/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # --- PostgreSQL ---
  postgres:
    image: postgres:16-alpine
    container_name: umkm-postgres-prod
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-umkm_db}
      POSTGRES_USER: ${POSTGRES_USER:-umkm_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Wajib diisi di .env -- jangan pakai default}
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
      - ./backend/db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-umkm_user} -d ${POSTGRES_DB:-umkm_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata_prod:
