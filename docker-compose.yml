# ============================================
# All-in-One Tools Administrasi UMKM
# Docker Compose — Development Environment
# ============================================
# Sesuai Technical Specification §3.3 & §3.4

services:
  # --- PostgreSQL ---
  postgres:
    image: postgres:16-alpine
    container_name: umkm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: umkm_db
      POSTGRES_USER: umkm_user
      POSTGRES_PASSWORD: umkm_pass
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U umkm_user -d umkm_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Redis ---
  redis:
    image: redis:7-alpine
    container_name: umkm-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Meilisearch ---
  meilisearch:
    image: getmeili/meilisearch:v1.9
    container_name: umkm-meilisearch
    restart: unless-stopped
    ports:
      - "7700:7700"
    environment:
      - MEILI_MASTER_KEY=umkm_master_key_123
    volumes:
      - meilidata:/meili_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
  meilidata:
