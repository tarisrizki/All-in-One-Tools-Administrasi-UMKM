name = "umkm-backend-workers"
main = "src/index.ts"
compatibility_date = "2024-05-29"

workers_dev = false
routes = [
  { pattern = "api.beres.lambada.my.id", custom_domain = true }
]

[vars]
# JANGAN pernah meletakkan SUPABASE_SERVICE_ROLE_KEY atau JWT_SECRET di file ini
# Simpan secret dengan perintah:
# npx wrangler secret put SUPABASE_URL
# npx wrangler secret put SUPABASE_SERVICE_ROLE_KEY
# npx wrangler secret put JWT_SECRET

[triggers]
crons = ["0 0 * * *"] # Run backup cron every day at midnight

[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "b053885b3e9e427988a40d2df107e575"
