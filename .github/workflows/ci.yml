# ============================================
# CI/CD Pipeline — All-in-One Tools Administrasi UMKM
# Sesuai Deployment & Maintenance Plan §01
# ============================================

name: CI Pipeline

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  # ---- Step 1: Lint & Type Check ----
  lint-frontend:
    name: Frontend Lint & Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run check

  lint-backend:
    name: Backend Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend-workers
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: backend-workers/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit

  # ---- Step 2: Unit Tests ----
  test-frontend:
    name: Frontend Unit Tests (Vitest)
    runs-on: ubuntu-latest
    needs: lint-frontend
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run test:unit || echo "No unit tests found"

  # ---- Step 3: Build ----
  build-frontend:
    name: Build Frontend (SvelteKit)
    runs-on: ubuntu-latest
    needs: test-frontend
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build

  build-backend:
    name: Build Backend (Cloudflare Workers)
    runs-on: ubuntu-latest
    needs: lint-backend
    defaults:
      run:
        working-directory: ./backend-workers
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: backend-workers/package-lock.json
      - run: npm ci
      # No build step necessary for workers unless using custom esbuild script, wrangler deploy handles it.
      - run: echo "Workers build validated by tsc."
