name: Keep Supabase Alive

on:
  schedule:
    # Run twice a week: Monday and Thursday at 00:00 UTC
    - cron: '0 0 * * 1,4'
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Backend Health Endpoint
        run: |
          echo "Pinging health endpoint to keep Supabase alive..."
          response=$(curl -s -o /dev/null -w "%{http_code}" https://api.beres.lambada.my.id/health)
          if [ "$response" -eq 200 ]; then
            echo "Successfully pinged API (Status: 200)"
          else
            echo "Warning: API returned status $response"
            exit 1
          fi
