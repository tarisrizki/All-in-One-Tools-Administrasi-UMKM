name: Database Full Backup

on:
  schedule:
    # Run once a week on Sunday at 02:00 UTC
    - cron: '0 2 * * 0'
  workflow_dispatch: # Allow manual trigger

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend-workers/package.json
          
      - name: Install dependencies
        working-directory: ./backend-workers
        run: npm install
        
      - name: Run Backup Script
        working-directory: ./backend-workers
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/backup-db.js
        
      - name: Upload Backup Artifact
        uses: actions/upload-artifact@v4
        with:
          name: supabase-database-backup
          path: backend-workers/backups/
          retention-days: 30
